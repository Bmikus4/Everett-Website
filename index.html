<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/ouro-mark.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ouro Praxis — Found money, paid on sits</title>
    <meta
      name="description"
      content="Ouro Praxis is the rehash department for window and door dealers. We work every layer of your CRM, book the live ones onto your calendar, and you only pay when the appointment sits."
    />
    <meta name="theme-color" content="#ffffff" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Ouro Praxis — Found money, paid on sits" />
    <meta
      property="og:description"
      content="The rehash department for window and door dealers. We work every layer of your CRM and book the live ones. You only pay when the appointment sits."
    />
    <meta property="og:image" content="/og.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ouro Praxis — Found money, paid on sits" />
    <meta
      name="twitter:description"
      content="We work every layer of your CRM and book the live ones onto your calendar. You only pay when the appointment sits."
    />
    <meta name="twitter:image" content="/og.png" />

    <!-- Set theme before paint to avoid flash of wrong theme -->
    <script>
      (function () {
        try {
          var s = localStorage.getItem('ouro-theme');
          var t = s === 'dark' ? 'dark' : 'light'; // default light unless user chose dark
          document.documentElement.dataset.theme = t;
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.setAttribute('content', t === 'dark' ? '#14120e' : '#ffffff');
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
